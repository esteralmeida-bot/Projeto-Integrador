<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atributos Globais</title>
</head>
<body>
    <h1>Atributos Globais</h1>
    <style>
        .destaque{
            color:deeppink;
        }
    </style>
<!-- Id: Indentificador único -->
 <p="mensagem">Olá, Mundo!</p>
    
 <!-- Class: Permite agrupar vários elementos com o mesmo estilo e comportamento. -->

<p class="destaque">Texto Importante</p>
<p class="destaque">Outro texto importante</p>

<!-- Style (estilo inline): Aplic CSS direto no elemento-->
 <h1 style="color:blueviolet;">Título Roxo</h1>
 
</body>
</html>
