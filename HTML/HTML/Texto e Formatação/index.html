<!DOCTYPE html><!--Indentifica que esse documento é HTML-->
<html lang="en"> 
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Texto em Formatação</title><!--titulo do navegador-->
</head>
<body>
    <!-- Exemplo 01: exibir texto em negrito -->
<p>Usando a tag certa, você deixa seu <b>texto em negrito</b></p>

    <!-- Exemplo 02: Destacar parte do texto --> 
     <p>A última palavra da frase é <strong>destacada</strong></p>
     
<!-- Exemplo 03: Deixar texto em Itálico --> 
     <p>A palavra a seguir será exibida em <i>itálico</i></p>

<!-- Exemplo 04: Sublinhar trechos de textos --> 
<p>Em diversas situações, é bom <u>sublinhar</u> uma palavra importante</p>

<!-- Exemplo 05: Tachar palavras -->
 <p>Esta oferta é válida até <s> 1º de Novembro</s> e 1º de Dezembro</p>

 <p><i><b>Ester Abreu Martins de Almeida</b></i></p>
 
</body> 
</html>
