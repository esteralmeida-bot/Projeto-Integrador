<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Exemplo 01: Hello Word</title>
    <style>
        body {
            /* Ativar o flexbox para o alinhamento */
            display: flex;

            /* Centraliza horizontalmente o elemento */
            justify-content: center;

            /* Verticalmente */
            align-items: center;

            /* Altura */
            height: 100vh;
            
            /* Cor de fundo */
            background-color: #FFB6C1;

            /* Fonte */
            font-family: 'Courier New', Courier, monospace;
        }
        /* Estilos aplicados ao titulo (h1) */
        h1 {
            /* cor do texto */ 
            color:palevioletred;

            /* Tamanho da Fonte (3 vezes o tamanho padrão) */
            font-size: 42px;

            /* cor da borda */
            border: 4px solid rgb(255, 153, 0);

            /* Espaçamento interno da borda */
            padding: 40px 60px;
            
            /* Bordas Redondinhas */
            border-radius: 10px;
        }
    </style>
</head>
<body>
    <h1>Hello Word</h1>
</body>
</html>
