<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Formas de Aplicar CSS</title>
</head>
<body>
    <h1>Formas de Aplicar CSS</h1>
    <!-- Inline na propria tag html -->
     <p style=color:hotpink;>Texto pink</p>

     <!-- Interno (No Head do HTML) -->
      <style>
        p{
            color:deeppink;
        }
      </style>
      <!-- Externo (arquivo separado) -->
       <!-- Forma mais recomendada para projetos reais -->
</body>
</html>
